name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"

          gh release create "$VERSION" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${{ github.event.repository.default_branch }}" \
            --title "$VERSION" \
            --generate-notes